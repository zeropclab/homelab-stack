# Alertmanager configuration for homelab-stack
global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 4h
  receiver: ntfy

receivers:
  - name: ntfy
    webhook_configs:
      - url: "https://ntfy.${DOMAIN}/homelab-alerts"
        send_resolved: true
        http_config:
          authorization:
            credentials: "${NTFY_TOKEN}"

  - name: gotify
    webhook_configs:
      - url: "https://gotify.${DOMAIN}/message?token=${GOTIFY_TOKEN}"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
